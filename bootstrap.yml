- name: bootstrap
  hosts: cloud
  remote_user: root
  roles:
    - role: unbound
    - role: nm
    - role: wireguard
  tasks:
    - name: update dnf cache
      dnf:
        update_cache: true
    - name: remove unwanted packages
      dnf:
        name:
          - cockpit
          - cockpit-system
          - cockpit-shell
          - cloud-init
          - abrt
          - gssproxy
          - libX11
          - firewalld
          - kernel-devel
        state: absent
        autoremove: true
        allowerasing: true
    - name: remove stale cloud-init MOTD
      file:
        path: /etc/motd
        state: absent
    - name: upgrade all packages
      dnf:
        name: "*"
        state: latest
    - name: reboot
      reboot:
